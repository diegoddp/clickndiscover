name: Deploy Static Site via SSH

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy package
        run: |
          mkdir -p deploy/brainwave
          mkdir -p deploy/keyslim
          cp "index.html" deploy/
          cp "robots.txt" deploy/
          cp "sitemap.xml" deploy/
          cp "brainwave/index.html" deploy/brainwave/
          cp "brainwave/billionaire-brain-wave-desktop.png" deploy/brainwave/
          cp "brainwave/billionaire-brain-wave-mobile.png" deploy/brainwave/
          if [ -f "brainwave/terms.html" ]; then cp "brainwave/terms.html" deploy/brainwave/; fi
          if [ -f "brainwave/privacy.html" ]; then cp "brainwave/privacy.html" deploy/brainwave/; fi
          cp "keyslim/index.html" deploy/keyslim/
          cp "keyslim/keyslim-desktop.png" deploy/keyslim/
          cp "keyslim/keyslim-mobile.png" deploy/keyslim/
          cp "keyslim/favicon.svg" deploy/keyslim/
          cp "keyslim/terms.html" deploy/keyslim/
          cp "keyslim/privacy.html" deploy/keyslim/

      - name: Clean target folder on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p "${{ secrets.SSH_TARGET_PATH }}"
            rm -rf "${{ secrets.SSH_TARGET_PATH }}"/*

      - name: Deploy site to server via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "deploy/"
          target: ${{ secrets.SSH_TARGET_PATH }}
          strip_components: 1
